<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2105503257991701" crossorigin="anonymous"></script>
  <script defer data-domain="x-techs.co.za" src="https://plausible.io/js/script.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Professional computer, laptop, phone repairs and IT support in South Africa. Fast screen replacements, data recovery & more.">
  <meta name="keywords" content="laptop repair, phone repair, screen replacement, data recovery, IT support, computer repair, South Africa">
  <title>X-TECHS IT Solutions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Yoco SDK -->
  <script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>

  <style>
    :root {
      --color-primary-blue: #00A9FF;
      --color-dark-bg: #0A0F1E;
      --color-light-bg: #1A202C;
    }
    body { font-family: 'Montserrat', sans-serif; }
    .bg-custom-dark { background-color: var(--color-dark-bg); }
    .bg-custom-light { background-color: var(--color-light-bg); }
    .text-primary-blue { color: var(--color-primary-blue); }
    .service-card, .product-card, .pricing-card {
      background-color: var(--color-light-bg);
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    .service-card:hover, .product-card:hover, .pricing-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px -3px rgba(0, 169, 255, 0.1);
      border-color: var(--color-primary-blue);
    }
    .terminal-bg {
      background: url('1a5c12aaf50b8dcf17b48b180e271123.jpg') center center / cover no-repeat;
      position: relative;
    }
    .terminal-bg::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(10, 15, 30, 0.75);
    }
    .terminal-content { position: relative; z-index: 2; }
    .star { transition: transform 0.2s; }
    .star:hover { transform: scale(1.2); }
    #cart-panel { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
  </style>
</head>
<body class="bg-custom-dark text-white overflow-x-hidden">

<!-- HEADER + MOBILE MENU OMITTED (same as your code) -->

<!-- Hero, Services, GadgeX Logo sections OMITTED (same as your code) -->

<!-- GadgeX Mini Shop -->
<section id="shop" class="py-16 bg-custom-light px-4">
  <div class="container mx-auto">
    <h2 class="text-4xl font-bold text-center mb-4 text-primary-blue">GadgeX Mini Shop</h2>
    <p class="text-center text-gray-400 mb-12">Add items to your basket and proceed to order</p>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid"></div>
  </div>
</section>

<!-- Order Form section OMITTED (keep Google Form iframe if you want) -->

<!-- Appointments, Contact, Footer OMITTED (keep as-is) -->

<!-- WhatsApp button OMITTED (keep as-is) -->

<!-- Cart Panel -->
<div id="cart-panel" class="fixed right-0 top-0 h-full w-full md:w-96 bg-custom-light shadow-2xl translate-x-full overflow-y-auto z-[60]">
  <div class="p-6">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">Your Cart</h3>
      <button id="close-cart" class="text-3xl leading-none">&times;</button>
    </div>
    <div id="cart-items" class="space-y-6 mb-8"></div>
    <div class="border-t border-gray-700 pt-6">
      <div class="flex justify-between text-lg">
        <span>Total</span>
        <span id="cart-total" class="font-bold text-primary-blue">R0</span>
      </div>
    </div>
    <button onclick="proceedToPayment()" class="mt-6 w-full bg-primary-blue hover:bg-[#008ecc] text-white font-semibold py-4 rounded-2xl">
      Proceed to Payment
    </button>
    <button onclick="clearCart()" class="mt-3 w-full bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-2xl text-sm">
      Clear Cart
    </button>
  </div>
</div>

<script>
const products = [
  { id: 1, name: "iPhone Screen Replacement", price: 899, img: "iphone.png" },
  { id: 2, name: "Samsung Galaxy Screen", price: 499, img: "samsung.png" },
  { id: 3, name: "USB-C 65W Charger", price: 149, img: "cables.png" },
  { id: 4, name: "Fast Charging Cable (2m)", price: 129, img: "cables.png" },
  { id: 5, name: "Tempered Glass Protector", price: 89, img: "special1.png" },
  { id: 6, name: "Wireless Earbuds", price: 399, img: "cables.png" },
  { id: 7, name: "Portable Power Bank 20000mAh", price: 299, img: "special.png" },
  { id: 8, name: "Data Recovery Service", price: 950, img: "laptop.png" },
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  products.forEach(product => {
    const card = document.createElement('div');
    card.className = 'product-card p-4 text-center';
    card.innerHTML = `
      <img src="${product.img}" alt="${product.name}" class="w-full h-40 object-cover rounded-xl mb-4">
      <h3 class="font-semibold mb-1">${product.name}</h3>
      <p class="text-primary-blue font-bold text-xl mb-4">R${product.price}</p>
      <button onclick="addToCart(${product.id})" class="bg-primary-blue hover:bg-[#008ecc] text-white w-full py-3 rounded-xl font-medium">
        Add to Cart
      </button>
    `;
    grid.appendChild(card);
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(item => item.id === id);
  if (existing) existing.qty += 1;
  else cart.push({ ...product, qty: 1 });
  saveCart();
  updateCart();
  openCart();
}

function updateCart() {
  const count = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById('cart-count').textContent = count;

  const container = document.getElementById('cart-items');
  container.innerHTML = '';
  let total = 0;

  cart.forEach((item, index) => {
    const subtotal = item.price * item.qty;
    total += subtotal;
    const div = document.createElement('div');
    div.className = 'flex gap-4 border-b border-gray-700 pb-6';
    div.innerHTML = `
      <div class="flex-1">
        <p class="font-medium">${item.name}</p>
        <p class="text-sm text-gray-400">R${item.price} × ${item.qty}</p>
      </div>
      <div class="text-right">
        <p class="font-bold">R${subtotal}</p>
        <div class="flex items-center gap-3 mt-2">
          <button onclick="changeQty(${index}, -1)" class="w-7 h-7 flex items-center justify-center bg-gray-700 rounded">-</button>
          <span class="w-6 text-center">${item.qty}</span>
          <button onclick="changeQty(${index}, 1)" class="w-7 h-7 flex items-center justify-center bg-gray-700 rounded">+</button>
          <button onclick="removeFromCart(${index})" class="text-red-400 ml-4">×</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById('cart-total').textContent = `R${total}`;
}

function changeQty(index, change) {
  cart[index].qty += change;
  if (cart[index].qty < 1) cart.splice(index, 1);
  saveCart();
  updateCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  updateCart();
}

function clearCart() {
  cart = [];
  saveCart();
  updateCart();
}

function openCart() { document.getElementById('cart-panel').classList.remove('translate-x-full'); }
function closeCart() { document.getElementById('cart-panel').classList.add('translate-x-full'); }

function proceedToPayment() {
  if (cart.length === 0) return alert("Your cart is empty!");
  
  let total = 0;
  cart.forEach(item => total += item.price * item.qty);

  const yoco = new YocoSDK({ publicKey: 'YOUR_PUBLIC_KEY_HERE' }); // Replace with your Yoco public key
  yoco.showPopup({
    amountInCents: total * 100,
    currency: 'ZAR',
    name: 'X-TECHS',
    description: 'GadgeX Order Payment',
    callback: function(result) {
      if (result.error) {
        alert("Payment failed: " + result.error.message);
      } else {
        alert("✅ Payment successful! Your order is confirmed.");
        clearCart();
        closeCart();
      }
    }
  });
}

// Event listeners
document.getElementById('cart-button').addEventListener('click', openCart);
document.getElementById('close-cart').addEventListener('click', closeCart);
document.getElementById('mobile-menu-button').addEventListener('click', () => {
  document.getElementById('mobile-menu').classList.toggle('hidden');
});

// Init
lucide.createIcons();
renderProducts();
updateCart();
</script>
</body>
</html>
